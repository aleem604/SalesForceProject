<template>
    <lightning-card title="Find Your Zodiac Sign" icon-name="custom:custom63">
        <div class="slds-m-around_medium">
            <!-- User Name Input -->
            <lightning-input
                type="text"
                label="Enter Your Name"
                value={userName}
                placeholder="Enter your full name"
                onchange={handleNameChange}
                class="slds-m-bottom_medium">
            </lightning-input>

            <!-- Date Picker -->
            <lightning-input
                type="date"
                label="Select Your Birth Date"
                value={selectedDate}
                onchange={handleDateChange}
                class="slds-m-bottom_medium">
            </lightning-input>

            <!-- Error Message -->
            <template if:true={errorMessage}>
                <div class="slds-text-color_error slds-m-bottom_medium">
                    {errorMessage}
                </div>
            </template>

            <!-- Results Section -->
            <template if:true={showResults}>
                <div class="slds-box slds-m-top_medium slds-theme_shade">
                    <h2 class="slds-text-heading_medium slds-m-bottom_small">
                        {greeting}
                    </h2>
                    
                    <div class="slds-grid slds-wrap">
                        <!-- Zodiac Emoji and Name -->
                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <span class="slds-text-heading_large" style="font-size: 4rem;">
                                {zodiacSign.emoji}
                            </span>
                            <span class="slds-text-heading_large slds-m-left_small">
                                {zodiacSign.sign}
                            </span>
                        </div>

                        <!-- Zodiac Details in Grid -->
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <strong>Dates:</strong> {zodiacSign.from} - {zodiacSign.to}
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <strong>Element:</strong> {zodiacSign.element}
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <strong>Quality:</strong> {zodiacSign.quality}
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <strong>Color:</strong> {zodiacSign.color}
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <strong>Ruling Planet:</strong> {zodiacSign.rulingPlanet}
                        </div>
                        
                        <!-- Trait -->
                        <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                            <div class="slds-box slds-theme_info">
                                <strong>Your Zodiac Trait:</strong>
                                <p class="slds-m-top_xx-small">{zodiacSign.trait}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Reset Button -->
            <template if:true={showResults}>
                <div class="slds-m-top_medium">
                    <lightning-button
                        label="Reset"
                        variant="destructive"
                        onclick={handleReset}>
                    </lightning-button>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
